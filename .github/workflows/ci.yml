name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # @globalcloudr/canopy-ui is served from GitHub Packages. The repo
          # .npmrc reads this token. Prefer an org/repo PAT secret; fall back to
          # the automatic GITHUB_TOKEN (needs packages:read, granted above).
          CANOPY_UI_PACKAGES_TOKEN: ${{ secrets.CANOPY_UI_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          CANOPY_UI_PACKAGES_TOKEN: ${{ secrets.CANOPY_UI_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
